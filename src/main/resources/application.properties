# Opste postavke
quarkus.http.port=8080
quarkus.http.limits.max-body-size=10M

# JWT autentifikacija
mp.jwt.verify.publickey.location=jwt/publicKey.pem
mp.jwt.verify.issuer=personal-finance-manager
smallrye.jwt.sign.key.location=jwt/privateKey.pem
app.jwt.token-duration-hours=24

# Direktorij za priloge transakcija
app.uploads.dir=uploads

# Ogranicenje prijava: nakon max-attempts neuspjelih pokusaja blokada na lockout-minutes
app.login.max-attempts=5
app.login.lockout-minutes=15

# OpenAPI / Swagger UI (dostupno na /q/swagger-ui)
quarkus.smallrye-openapi.info-title=Personal Finance Manager API
quarkus.smallrye-openapi.info-version=1.0
quarkus.swagger-ui.always-include=true

# REST klijenti (vanjski API-ji)
quarkus.rest-client.ip-api.url=https://api.ipify.org
quarkus.rest-client.timezone-api.url=https://timeapi.io
quarkus.rest-client.location-api.url=https://ipapi.co
quarkus.rest-client.currency-api.url=https://api.frankfurter.dev

# Dev profil (lokalni PostgreSQL)
%dev.quarkus.datasource.db-kind=PostgreSQL
%dev.quarkus.datasource.username=pfm_user
%dev.quarkus.datasource.password=admin123
%dev.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/pfm_db
%dev.quarkus.hibernate-orm.schema-management.strategy=drop-and-create
%dev.quarkus.hibernate-orm.log.sql=true
%dev.app.seed-demo-data=true

# Test profil (H2 u memoriji, ne zahtijeva Docker ni PostgreSQL)
%test.quarkus.datasource.db-kind=H2
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:pfm;DB_CLOSE_DELAY=-1
%test.quarkus.hibernate-orm.schema-management.strategy=drop-and-create
%test.app.seed-demo-data=false

# Prod profil (sve vrijednosti dolaze iz environment varijabli;
# DB_PASSWORD je obavezan - aplikacija se bez njega ne pokrece)
%prod.quarkus.datasource.db-kind=PostgreSQL
%prod.quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://localhost:5432/pfm_db}
%prod.quarkus.datasource.username=${DB_USER:pfm_user}
%prod.quarkus.datasource.password=${DB_PASSWORD}
%prod.quarkus.datasource.jdbc.max-size=16
%prod.quarkus.hibernate-orm.log.sql=false
%prod.app.seed-demo-data=${SEED_DEMO_DATA:false}
%prod.app.uploads.dir=${UPLOADS_DIR:uploads}

# Sema se u produkciji kreira iskljucivo kroz Flyway migracije (db/migration),
# Hibernate je samo validira. U dev/test profilu ostaje drop-and-create.
%prod.quarkus.flyway.migrate-at-start=true
%prod.quarkus.hibernate-orm.schema-management.strategy=validate
%dev.quarkus.flyway.migrate-at-start=false
%test.quarkus.flyway.migrate-at-start=false

# JWT kljucevi se u produkciji mogu zamijeniti vlastitim bez rebuilda
# (mount + putanje kroz environment varijable)
%prod.mp.jwt.verify.publickey.location=${JWT_PUBLIC_KEY_LOCATION:jwt/publicKey.pem}
%prod.smallrye.jwt.sign.key.location=${JWT_PRIVATE_KEY_LOCATION:jwt/privateKey.pem}
