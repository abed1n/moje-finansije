services:
  db:
    image: postgres:17-alpine
    container_name: pfm-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pfm_db}
      POSTGRES_USER: ${POSTGRES_USER:-pfm_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin123}
    volumes:
      - pfm-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pfm_user} -d ${POSTGRES_DB:-pfm_db}"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  app:
    build: .
    container_name: pfm-app
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      DB_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-pfm_db}
      DB_USER: ${POSTGRES_USER:-pfm_user}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-admin123}
      # Demo podaci pri prvom pokretanju (demo@pfm.me / demo123)
      SEED_DEMO_DATA: ${SEED_DEMO_DATA:-true}
      UPLOADS_DIR: /app/uploads
      # Google prijava (opciono): postavi client id iz Google Cloud konzole.
      # Ako je prazno, opcija se ne prikazuje.
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      # Slanje emaila (reset lozinke, potvrda adrese). Podrazumijevano mock (link u logu);
      # za pravo slanje postavi MAILER_MOCK=false i SMTP podatke.
      MAILER_MOCK: ${MAILER_MOCK:-true}
      MAILER_HOST: ${MAILER_HOST:-smtp.example.com}
      MAILER_PORT: ${MAILER_PORT:-587}
      MAILER_USERNAME: ${MAILER_USERNAME:-}
      MAILER_PASSWORD: ${MAILER_PASSWORD:-}
      MAILER_FROM: ${MAILER_FROM:-Moje finansije <no-reply@moje-finansije.me>}
      # Osnovni URL za linkove u emailu i Secure flag na kolacicu (za HTTPS deploy)
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8080}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      # JWT kljucevi. Podrazumijevano demo kljucevi iz slike; za produkciju
      # postavi putanje u .env i otkomentarisi mount kljuceva dole.
      JWT_PRIVATE_KEY_LOCATION: ${JWT_PRIVATE_KEY_LOCATION:-jwt/privateKey.pem}
      JWT_PUBLIC_KEY_LOCATION: ${JWT_PUBLIC_KEY_LOCATION:-jwt/publicKey.pem}
    volumes:
      - pfm-uploads:/app/uploads
      # - ./keys:/app/keys:ro
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/q/health/ready"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

volumes:
  pfm-data:
  pfm-uploads:
